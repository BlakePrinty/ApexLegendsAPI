<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apex Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; }
        header {
            background: #1a1a1a;
            border-bottom: 2px solid #c8102e;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { color: #c8102e; font-size: 1.4rem; }
        .logout-btn {
            background: transparent;
            border: 1px solid #c8102e;
            color: #c8102e;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .logout-btn:hover { background: #c8102e; color: #fff; }
        .container { padding: 32px; max-width: 1100px; margin: 0 auto; }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h2 { font-size: 1.2rem; color: #ccc; }
        .add-btn {
            background: #c8102e;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .add-btn:hover { background: #a00d24; }
        table { width: 100%; border-collapse: collapse; background: #1a1a1a; border-radius: 10px; overflow: hidden; }
        th { background: #c8102e; padding: 14px 16px; text-align: left; font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 12px 16px; border-bottom: 1px solid #2a2a2a; font-size: 0.9rem; color: #ccc; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #222; }
        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            margin-right: 6px;
        }
        .edit-btn { background: #2a6db5; color: #fff; }
        .edit-btn:hover { background: #1f5490; }
        .delete-btn { background: #c8102e; color: #fff; }
        .delete-btn:hover { background: #a00d24; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 32px;
            width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h3 { color: #c8102e; margin-bottom: 20px; font-size: 1.2rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-grid .full { grid-column: 1 / -1; }
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 4px; }
        input, select {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
        }
        input:focus, select:focus { outline: none; border-color: #c8102e; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .cancel-btn {
            background: transparent;
            border: 1px solid #555;
            color: #ccc;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        .save-btn {
            background: #c8102e;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .save-btn:hover { background: #a00d24; }
    </style>
</head>
<body>

<header>
    <h1>⚡ APEX LEGENDS ADMIN</h1>
    <form action="/perform_logout" method="post">
        <button class="logout-btn" type="submit">Logout</button>
    </form>
</header>

<div class="container">
    <div class="section-header">
        <h2>All Legends</h2>
        <button class="add-btn" onclick="openModal()">+ Add Legend</button>
    </div>
    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Real Name</th>
            <th>Class</th>
            <th>Home World</th>
            <th>Age</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="legendsTableBody"></tbody>
    </table>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3 id="modalTitle">Add Legend</h3>
        <div class="form-grid">
            <div>
                <label>Name</label>
                <input type="text" id="f-name" />
            </div>
            <div>
                <label>Real Name</label>
                <input type="text" id="f-realName" />
            </div>
            <div>
                <label>Age</label>
                <input type="number" id="f-age" />
            </div>
            <div>
                <label>Home World</label>
                <input type="text" id="f-homeWorld" />
            </div>
            <div>
                <label>Class</label>
                <select id="f-legendClass">
                    <option>Assault</option>
                    <option>Skirmisher</option>
                    <option>Defensive</option>
                    <option>Support</option>
                    <option>Recon</option>
                </select>
            </div>
            <div>
                <label>Image Path</label>
                <input type="text" id="f-imagePath" placeholder="/images/legend.png" />
            </div>
            <div>
                <label>Tactical Name</label>
                <input type="text" id="f-tacticalName" />
            </div>
            <div class="full">
                <label>Tactical Description</label>
                <input type="text" id="f-tacticalDescription" />
            </div>
            <div>
                <label>Passive Name</label>
                <input type="text" id="f-passiveName" />
            </div>
            <div class="full">
                <label>Passive Description</label>
                <input type="text" id="f-passiveDescription" />
            </div>
            <div>
                <label>Ultimate Name</label>
                <input type="text" id="f-ultimateName" />
            </div>
            <div class="full">
                <label>Ultimate Description</label>
                <input type="text" id="f-ultimateDescription" />
            </div>
        </div>
        <div class="modal-actions">
            <button class="cancel-btn" onclick="closeModal()">Cancel</button>
            <button class="save-btn" onclick="saveLegend()">Save</button>
        </div>
    </div>
</div>

<script>
    const API = '/api/legends';
    let editingId = null;

    async function loadLegends() {
        const res = await fetch(API);
        const legends = await res.json();
        const tbody = document.getElementById('legendsTableBody');
        tbody.innerHTML = legends.map(l => `
            <tr>
                <td>${l.name}</td>
                <td>${l.realName}</td>
                <td>${l.legendClass}</td>
                <td>${l.homeWorld}</td>
                <td>${l.age}</td>
                <td>
                    <button class="action-btn edit-btn" onclick="openModal(${JSON.stringify(l).replace(/"/g, '&quot;')})">Edit</button>
                    <button class="action-btn delete-btn" onclick="deleteLegend(${l.id})">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    function openModal(legend = null) {
        editingId = legend ? legend.id : null;
        document.getElementById('modalTitle').textContent = legend ? 'Edit Legend' : 'Add Legend';
        document.getElementById('f-name').value = legend?.name || '';
        document.getElementById('f-realName').value = legend?.realName || '';
        document.getElementById('f-age').value = legend?.age || '';
        document.getElementById('f-homeWorld').value = legend?.homeWorld || '';
        document.getElementById('f-legendClass').value = legend?.legendClass || 'Assault';
        document.getElementById('f-imagePath').value = legend?.imagePath || '';
        document.getElementById('f-tacticalName').value = legend?.tacticalName || '';
        document.getElementById('f-tacticalDescription').value = legend?.tacticalDescription || '';
        document.getElementById('f-passiveName').value = legend?.passiveName || '';
        document.getElementById('f-passiveDescription').value = legend?.passiveDescription || '';
        document.getElementById('f-ultimateName').value = legend?.ultimateName || '';
        document.getElementById('f-ultimateDescription').value = legend?.ultimateDescription || '';
        document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        editingId = null;
    }

    async function saveLegend() {
        const legend = {
            name: document.getElementById('f-name').value,
            realName: document.getElementById('f-realName').value,
            age: parseInt(document.getElementById('f-age').value),
            homeWorld: document.getElementById('f-homeWorld').value,
            legendClass: document.getElementById('f-legendClass').value,
            imagePath: document.getElementById('f-imagePath').value,
            tacticalName: document.getElementById('f-tacticalName').value,
            tacticalDescription: document.getElementById('f-tacticalDescription').value,
            passiveName: document.getElementById('f-passiveName').value,
            passiveDescription: document.getElementById('f-passiveDescription').value,
            ultimateName: document.getElementById('f-ultimateName').value,
            ultimateDescription: document.getElementById('f-ultimateDescription').value,
        };

        const url = editingId ? `${API}/${editingId}` : API;
        const method = editingId ? 'PUT' : 'POST';

        await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(legend)
        });

        closeModal();
        loadLegends();
    }

    async function deleteLegend(id) {
        if (!confirm('Are you sure you want to delete this legend?')) return;
        await fetch(`${API}/${id}`, { method: 'DELETE' });
        loadLegends();
    }

    loadLegends();
</script>

</body>
</html>
